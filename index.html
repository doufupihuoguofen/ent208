<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonance EchoPlay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-base:       #0a0d12;
      --bg-card:       #12161c;
      --bg-deep:       #0d1117;
      --bg-input:      #1a1f28;
      --purple-bright: #b7a9ff;
      --purple-mid:    #8f7aff;
      --purple-deep:   #7f6af0;
      --purple-dark:   #5f4ab0;
      --text-primary:  #ececff;
      --text-secondary:#b8c0d8;
      --text-muted:    #7a85a5;
      --border-subtle: rgba(138,110,255,0.12);
      --radius-card:   28px;
      --radius-btn:    40px;
      --radius-input:  16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
    }
    button,input { font: inherit; }
    .app-view { min-height: 100vh; }
    .top-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px; border-bottom:1px solid var(--border-subtle);
      background:rgba(10,13,18,.85); position:sticky; top:0; z-index:30; backdrop-filter:blur(8px);
    }
    .brand { letter-spacing: 3px; color: var(--purple-bright); font-size: 12px; text-transform: uppercase; }
    .nav-actions { display:flex; gap:10px; }
    .icon-btn {
      width:42px; height:42px; border-radius:50%; border:1px solid var(--border-subtle);
      background:var(--bg-card); color:var(--text-secondary); cursor:pointer;
    }
    .icon-btn:hover { color:var(--purple-bright); border-color:rgba(143,122,255,.45); }
    .view-test,.view-profile {
      background:linear-gradient(180deg,#0a0d12,#0d1117 30%,#0a0d12);
      padding-bottom:42px;
    }
    .main-wrap { width:min(1100px,calc(100% - 32px)); margin:18px auto; }
    .card {
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:var(--radius-card); padding:22px;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    .step-title { margin:0 0 8px; font-size: 26px; font-weight:500; }
    .step-sub { margin:0 0 18px; color:var(--text-muted); }
    .stepper { display:flex; gap:8px; margin-bottom:16px; }
    .step-dot { flex:1; height:8px; border-radius:999px; background:#232a36; overflow:hidden; }
    .step-dot > span { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--purple-mid),var(--purple-bright)); transition:width .3s; }
    .timer-line { display:flex; align-items:center; justify-content:space-between; margin:8px 0 14px; color:var(--text-secondary); }
    .timer-bar { width:100%; height:10px; border-radius:999px; background:#222a36; overflow:hidden; }
    .timer-bar span { display:block; height:100%; width:100%; background:linear-gradient(90deg,#b7a9ff,#7f6af0); transition:width .15s linear; }
    .step-controls { display:flex; justify-content:flex-end; margin-top:14px; }
    .primary-btn {
      border:none; background:#d9d0ff; color:#0b0e14; border-radius:var(--radius-btn);
      padding:12px 22px; font-weight:600; cursor:pointer;
    }
    .primary-btn:hover { background:#e7deff; }
    .ghost-btn {
      border:1px solid var(--border-subtle); background:transparent; color:var(--text-secondary);
      border-radius:var(--radius-btn); padding:10px 18px; cursor:pointer;
    }
    .step-canvas-wrap {
      position:relative; width:100%; height:320px; border-radius:20px;
      background:#0b0f15; border:1px solid rgba(143,122,255,.18); overflow:hidden;
    }
    canvas.step-canvas { width:100%; height:100%; display:block; }
    .center-pulse {
      position:absolute; left:50%; top:50%; width:22px; height:22px; border-radius:50%;
      border:2px solid #b7a9ff; transform:translate(-50%,-50%); opacity:.9;
      box-shadow:0 0 16px rgba(143,122,255,.45);
    }
    .center-pulse.active { animation:pulse .24s ease-out; }
    @keyframes pulse { from { transform:translate(-50%,-50%) scale(1);} to {transform:translate(-50%,-50%) scale(1.8); opacity:.3;} }
    .result-layout { display:grid; grid-template-columns: 1.2fr .8fr; gap:16px; margin-top:16px; }
    .type-head { display:flex; align-items:center; gap:12px; font-size:26px; margin-bottom:8px; }
    .type-head i { color:var(--purple-bright); }
    .fortune-box { background:#10151d; border:1px solid var(--border-subtle); border-radius:18px; padding:14px; }
    .fortune-title { margin:0 0 8px; color:var(--purple-bright); }
    ul.clean { margin:6px 0 0 0; padding-left:18px; color:var(--text-secondary); }
    .mix-player { margin-top:14px; }
    #mix-wave { width:100%; height:110px; border:1px solid var(--border-subtle); border-radius:14px; background:#0b1018; }
    .wall-post { display:flex; gap:10px; margin:12px 0; }
    .wall-post input {
      flex:1; background:var(--bg-input); color:var(--text-primary);
      border:1px solid #2a3140; border-radius:12px; padding:10px 12px;
    }
    .wall-list { display:grid; gap:10px; max-height:360px; overflow:auto; }
    .wall-item {
      background:#0f141d; border:1px solid rgba(143,122,255,.18); border-radius:14px;
      padding:10px 12px; display:flex; justify-content:space-between; gap:10px;
    }
    .wall-meta { color:var(--text-muted); font-size:12px; }
    .like-btn { border:none; background:transparent; color:#a9b3d1; cursor:pointer; }
    .like-btn.liked { color:#ff95b7; }
    .profile-grid { display:grid; grid-template-columns:320px 1fr; gap:16px; }
    .avatar {
      width:86px; height:86px; border-radius:50%; background:#1d2531;
      display:flex; align-items:center; justify-content:center; color:var(--purple-bright); font-size:34px;
      border:1px solid var(--border-subtle);
    }
    .muted { color: var(--text-muted); }
    .history-list { display:grid; gap:10px; }
    .history-item { border-left:2px solid #4d3f9c; padding:8px 12px; background:#0f141d; border-radius:10px; }
    @media (max-width: 900px) { .result-layout, .profile-grid { grid-template-columns:1fr; } }

.view-login {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0d12 0%, #0d1117 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-container {
  display: flex;
  max-width: 1040px;
  width: 100%;
  background: #12161c;
  border-radius: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(100,80,255,0.08);
  overflow: hidden;
  min-height: 580px;
}
.login-left {
  flex: 1.1;
  background: #0d1117;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  border-right: 1px solid rgba(138,110,255,0.12);
}
.character-group { display:flex; gap:32px; align-items:flex-end; justify-content:center; margin-bottom:40px; width:100%; }
.character { display:flex; flex-direction:column; align-items:center; transition:transform 0.25s cubic-bezier(0.34,1.3,0.64,1); flex:0 0 auto; }
.head-wrapper { transform-origin:center bottom; transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }
.char-head {
  width:72px; height:72px; background:transparent; border:2.5px solid #b7b7ff;
  border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; box-shadow:0 0 12px rgba(120,100,255,0.2); transition:border-color 0.25s,box-shadow 0.25s;
}
.eyes { display:flex; gap:16px; margin-top:4px; justify-content:center; }
.eye { width:22px; height:22px; border:2px solid #c4c4ff; border-radius:50%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.pupil { width:9px; height:9px; background:#d4c5ff; border-radius:50%; transition:transform 0.08s linear; box-shadow:0 0 8px #a88eff; will-change:transform; }
.char-mouth { width:18px; height:5px; border-bottom:2px solid #a0a0e0; border-radius:0 0 10px 10px; margin-top:8px; opacity:0.6; }
.body-line { width:2px; height:44px; background:#7a7ad9; margin-top:-2px; opacity:0.45; }
.neck-dot { width:10px; height:10px; border:2px solid #a088ff; border-radius:50%; margin-top:6px; opacity:0.7; }
.character-label { color:#b0b8d0; font-size:12px; letter-spacing:2.5px; text-transform:uppercase; margin-top:14px; font-weight:400; opacity:0.65; }
.character.peeking .head-wrapper { transform:translateY(-3px) scale(1.01); }
.character.peeking .char-head { border-color:#c6b0ff; box-shadow:0 0 20px rgba(127,106,240,0.25); }
.character.avoiding .head-wrapper { transform:rotate(-10deg) translateX(-3px); }
.character.avoiding .char-head { border-color:#6a6a9a; box-shadow:0 0 8px #4a4080; }
.character.avoiding .pupil { opacity:0.45; }
.character:nth-child(2) .body-line { height:54px; }
.character:nth-child(2) .char-head { width:76px; height:76px; }
.left-hint { color:#6e7a9a; font-size:12px; margin-top:20px; text-transform:uppercase; letter-spacing:4px; opacity:0.55; text-align:center; }
.login-right { flex:1; padding:52px 48px; display:flex; flex-direction:column; justify-content:center; background:#12161c; }
.login-logo { color:#b7a9ff; font-weight:500; letter-spacing:5px; font-size:13px; margin-bottom:12px; text-transform:uppercase; opacity:0.9; }
.login-title { font-size:38px; font-weight:350; color:#ececff; margin-bottom:8px; letter-spacing:-0.5px; }
.login-subtitle { color:#8592b0; margin-bottom:38px; font-size:14px; border-left:3px solid #7f6af0; padding-left:18px; line-height:1.4; }
.input-group { margin-bottom:24px; position:relative; }
.input-label { display:block; margin-bottom:8px; font-weight:400; color:#b8c0d8; font-size:12px; text-transform:uppercase; letter-spacing:1.2px; }
.input-field { width:100%; padding:15px 18px; padding-right:50px; background:#1a1f28; border:1.5px solid #2a3140; border-radius:16px; font-size:15px; color:#ececff; transition:all 0.2s; outline:none; }
.input-field:focus { border-color:#8f7aff; background:#1b222e; box-shadow:0 0 0 3px rgba(120,90,255,0.12); }
.input-field::placeholder { color:#5b6680; font-size:14px; }
.toggle-password { position:absolute; right:18px; top:44px; cursor:pointer; color:#7a85a5; font-size:18px; transition:color 0.2s; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.toggle-password:hover { color:#c0b0ff; }
.login-options { display:flex; justify-content:space-between; align-items:center; margin:18px 0 30px; }
.remember-label { display:flex; align-items:center; gap:10px; color:#9da6c0; font-size:13px; }
.remember-label input { accent-color:#7f6af0; width:18px; height:18px; margin:0; }
.forgot-link { color:#b0a3ff; text-decoration:none; font-size:13px; border-bottom:1px dotted #5f5490; padding-bottom:2px; }
.forgot-link:hover { color:#d6caff; }
.begin-btn { background:#d9d0ff; color:#0b0e14; border:none; padding:16px 24px; border-radius:40px; font-weight:600; font-size:15px; letter-spacing:1.5px; cursor:pointer; transition:all 0.2s; margin-bottom:26px; text-transform:uppercase; box-shadow:0 8px 18px rgba(100,70,220,0.2); width:100%; }
.begin-btn:hover { background:#e8e0ff; box-shadow:0 10px 22px #5f4ab0; transform:scale(1.01); }
.signup-area { text-align:center; color:#7a85a5; font-size:14px; }
.signup-link { color:#cfc3ff; text-decoration:none; font-weight:500; margin-left:8px; }
.signup-link:hover { text-decoration:underline; color:#e0d6ff; }
.login-footer { margin-top:34px; display:flex; gap:28px; justify-content:center; font-size:11px; color:#5e6a88; text-transform:uppercase; letter-spacing:0.5px; }
.login-footer a { color:#7a85a5; text-decoration:none; transition:color 0.2s; }
.login-footer a:hover { color:#a89eff; }
@media (max-width:720px) {
  .login-container { flex-direction:column; border-radius:24px; }
  .login-left { border-right:none; border-bottom:1px solid #2a2e4a; padding:36px 20px; }
  .login-right { padding:40px 32px; }
  .character-group { gap:20px; }
}
  </style>
</head>

function generateFinalMix(config){ const ac=initAudio(); if(lastMixRunner){ lastMixRunner.stop?.(); } const analyser=ac.createAnalyser(); analyser.fftSize=2048; const comp=ac.createDynamicsCompressor(),master=ac.createGain(); comp.threshold.value=-24; comp.ratio.value=3; master.gain.value=.0001; comp.connect(master).connect(analyser).connect(ac.destination); const bpm=Math.max(60,Math.min(140,config.rhythm.bpm||92)),beat=60/bpm,grid=beat/2,len=42,t0=ac.currentTime+.08; master.gain.exponentialRampToValueAtTime(.85,t0+.6); master.gain.setTargetAtTime(.0001,t0+len-1,.5); function kick(t){const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(45,t+.12); g.gain.setValueAtTime(.001,t); g.gain.exponentialRampToValueAtTime(.45,t+.005); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.connect(g).connect(comp); o.start(t); o.stop(t+.22);} function hat(t){const b=ac.createBuffer(1,ac.sampleRate*.04,ac.sampleRate),d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const s=ac.createBufferSource(),hp=ac.createBiquadFilter(),g=ac.createGain(); s.buffer=b; hp.type='highpass'; hp.frequency.value=6000; g.gain.value=.08; s.connect(hp).connect(g).connect(comp); s.start(t); s.stop(t+.04);} for(let t=t0;t<t0+len;t+=beat) kick(t); for(let t=t0+beat/2;t<t0+len;t+=beat/2) if(Math.random()<0.86) hat(t); const mode=config.harmony.modeIndex||0,raw=(config.melody.notePattern||[60,62,64,67]).map(n=>quantizeToScale(n,mode,60)),seq=[]; for(let i=0;i<Math.ceil(len/(grid*raw.length));i++) seq.push(...raw); for(let i=0;i<seq.length;i++){ const t=t0+i*grid; if(t>t0+len-1) break; const o=ac.createOscillator(),g=ac.createGain(); o.type='square'; o.frequency.value=440*Math.pow(2,(seq[i]-69)/12); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.1,t+.015); g.gain.exponentialRampToValueAtTime(.001,t+grid*.88); o.connect(g).connect(comp); o.start(t); o.stop(t+grid*.92); } drawWaveform(analyser,document.getElementById('mix-wave'),t0+len); lastMixRunner={stop(){ master.gain.cancelScheduledValues(ac.currentTime); master.gain.setTargetAtTime(.0001,ac.currentTime,.05); }}; }
function drawWaveform(analyser,canvas,stopAt){ const dpr=window.devicePixelRatio||1,r=canvas.getBoundingClientRect(); canvas.width=r.width*dpr; canvas.height=r.height*dpr; const c=canvas.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0); const arr=new Uint8Array(analyser.fftSize); (function frame(){ if(audioCtx&&audioCtx.currentTime>stopAt+.2) return; analyser.getByteTimeDomainData(arr); c.clearRect(0,0,r.width,r.height); c.strokeStyle='rgba(143,122,255,.95)'; c.lineWidth=2; c.beginPath(); const max=110,step=Math.max(1,Math.floor(arr.length/max)); let idx=0; for(let i=0;i<arr.length;i+=step){const x=idx/(Math.ceil(arr.length/step)-1)*r.width,y=(arr[i]/255)*r.height; idx===0?c.moveTo(x,y):c.lineTo(x,y); idx++;} c.stroke(); requestAnimationFrame(frame); })(); }
function renderVibeWall(typeId){ const type=TYPE_DB.find(t=>t.id===typeId)||TYPE_DB[6],listEl=document.getElementById('wall-list'),liked=JSON.parse(localStorage.getItem('resonance_wall_liked')||'{}'); const presets=[...type.messages_pool].sort((a,b)=>b.likes-a.likes).map((m,i)=>({...m,_id:'preset_'+i})),userMsgs=loadWall(typeId).map(m=>({...m,_id:m.id||('u'+Math.random())})),all=[...presets,...userMsgs].slice(0,50); listEl.innerHTML=''; all.forEach(m=>{ const row=document.createElement('div'); row.className='wall-item'; const left=document.createElement('div'); left.innerHTML=`<div>${escapeHTML(m.text)}</div><div class="wall-meta">${escapeHTML(m.uid)}</div>`; const right=document.createElement('button'); right.className='like-btn'+(liked[m._id]?' liked':''); right.innerHTML=`<i class="fas fa-heart"></i> ${m.likes+(liked[m._id]?1:0)}`; right.onclick=()=>{ liked[m._id]=!liked[m._id]; localStorage.setItem('resonance_wall_liked',JSON.stringify(liked)); renderVibeWall(typeId); }; row.append(left,right); listEl.appendChild(row); }); }
function renderResultPage(type,config){ activeType=type; document.getElementById('test-card').style.display='none'; document.getElementById('result-card').style.display='block'; document.getElementById('type-head').innerHTML=`<i class="fas fa-wave-square"></i><div><div>${type.name.zh}</div><div class="muted" style="font-size:14px">${type.name.en} · ${type.code}</div></div>`; document.getElementById('type-basis').textContent=type.psychology_basis; document.getElementById('fortune-rating').textContent=type.daily_fortune.rating; document.getElementById('fortune-dos').innerHTML=type.daily_fortune.dos.map(v=>`<li>${escapeHTML(v)}</li>`).join(''); document.getElementById('fortune-donts').innerHTML=type.daily_fortune.donts.map(v=>`<li>${escapeHTML(v)}</li>`).join(''); document.getElementById('fortune-lucky').textContent=type.daily_fortune.lucky_activity; document.getElementById('replay-mix').onclick=()=>generateFinalMix(config); renderVibeWall(type.id); }
function completeTest(){ cleanupStep(); clearTimer(); const vec=computePsychVector(sessionConfig),type=matchType(vec)||TYPE_DB[6]; const todayData={sessionConfig:JSON.parse(JSON.stringify(sessionConfig)),type,completed:true}; saveTodayData(todayData); const hist=loadHistory(); hist.unshift({date:new Date().toISOString().slice(0,10),typeId:type.id,summary:type.name.zh}); saveHistory(hist.slice(0,30)); generateFinalMix(sessionConfig); renderResultPage(type,sessionConfig); }
function initTestView(){ document.getElementById('next-step').onclick=()=>nextStep(); document.getElementById('to-profile').onclick=()=>{showView('PROFILE'); initProfileView();}; document.getElementById('view-history-btn').onclick=()=>{showView('PROFILE'); initProfileView();}; document.getElementById('wall-send').onclick=()=>{ if(!activeType||!currentUser) return; const input=document.getElementById('wall-input'),t=escapeHTML(input.value.trim().slice(0,30)); if(!t) return; const arr=loadWall(activeType.id); arr.unshift({id:'u_'+Date.now(),uid:'匿名#'+Math.random().toString(16).slice(2,6).toUpperCase(),text:t,likes:0}); saveWall(activeType.id,arr.slice(0,50)); input.value=''; renderVibeWall(activeType.id); }; }
function initProfileView(){ const u=loadUser(); if(!u){ showView('LOGIN'); initLoginView(); return; } document.getElementById('profile-avatar').innerHTML=`<i class="fas ${escapeHTML(u.avatar||'fa-user-astronaut')}"></i>`; document.getElementById('profile-name').textContent=u.nickname||'Echo'; document.getElementById('profile-joined').textContent=`Joined ${new Date(u.joinedAt||Date.now()).toLocaleString()}`; renderHistoryTimeline(); document.getElementById('back-test').onclick=()=>showView('TEST'); document.getElementById('logout-btn').onclick=()=>{ try{ localStorage.removeItem('resonance_user'); }catch(e){} currentUser=null; showView('LOGIN'); initLoginView(); }; document.getElementById('clear-history-btn').onclick=()=>{ saveHistory([]); renderHistoryTimeline(); }; }
function renderHistoryTimeline(){ const list=document.getElementById('history-list'),h=loadHistory(); list.innerHTML=''; if(!h.length){ list.innerHTML='<div class="muted">暂无记录，先完成一次今日测试。</div>'; return; } h.slice(0,30).forEach(item=>{ const type=TYPE_DB.find(t=>t.id===item.typeId),el=document.createElement('div'); el.className='history-item'; el.innerHTML=`<div>${escapeHTML(item.date)} · ${escapeHTML(item.summary||type?.name?.zh||item.typeId)}</div><div class="muted" style="font-size:12px">${escapeHTML(type?.code||'')}</div>`; list.appendChild(el); }); }
function initLoginView(){ const chars=['lc-char1','lc-char2','lc-char3'].map(id=>document.getElementById(id)); const pupils=[{L:document.getElementById('lc-p1L'),R:document.getElementById('lc-p1R')},{L:document.getElementById('lc-p2L'),R:document.getElementById('lc-p2R')},{L:document.getElementById('lc-p3L'),R:document.getElementById('lc-p3R')}]; const pwdEl=document.getElementById('lc-password'),toggleEl=document.getElementById('lc-togglePwd'),eyeIcon=document.getElementById('lc-eyeIcon'),beginBtn=document.getElementById('lc-beginBtn'),nickEl=document.getElementById('lc-nickname'),signupEl=document.getElementById('lc-signupLink'); const target=[{x:0,y:0},{x:0,y:0},{x:0,y:0}],cur=[{x:0,y:0},{x:0,y:0},{x:0,y:0}]; let lcRafId; function lcRaf(){ chars.forEach((c,i)=>{ cur[i].x+=(target[i].x-cur[i].x)*0.15; cur[i].y+=(target[i].y-cur[i].y)*0.15; if(c.classList.contains('avoiding')) return; const ex=c.classList.contains('peeking')?3.5:0, ey=c.classList.contains('peeking')?-1.5:0; pupils[i].L.style.transform=`translate(${cur[i].x+ex}px,${cur[i].y+ey}px)`; pupils[i].R.style.transform=`translate(${cur[i].x+ex}px,${cur[i].y+ey}px)`; }); lcRafId=requestAnimationFrame(lcRaf);} lcRafId=requestAnimationFrame(lcRaf); const mmHandler=e=>{ chars.forEach((c,i)=>{ const head=c.querySelector('.char-head'),rect=head.getBoundingClientRect(),dx=e.clientX-(rect.left+rect.width/2),dy=e.clientY-(rect.top+rect.height/2),dist=Math.sqrt(dx*dx+dy*dy); if(dist>5){ const a=Math.atan2(dy,dx); target[i].x=Math.cos(a)*5; target[i].y=Math.sin(a)*5; } else { target[i].x=dx; target[i].y=dy; } }); }; document.addEventListener('mousemove',mmHandler); function syncPose(){ const vis=pwdEl.type==='text'; chars.forEach(c=>{ c.classList.toggle('peeking',!vis); c.classList.toggle('avoiding',vis); }); eyeIcon.className=vis?'far fa-eye':'far fa-eye-slash'; } toggleEl.onclick=e=>{ e.preventDefault(); pwdEl.type=pwdEl.type==='password'?'text':'password'; syncPose(); }; syncPose(); function doLogin(nickname){ const name=nickname.trim(); if(!name) return; if(!loadUser()){ const uid='UID_'+Math.random().toString(36).slice(2,8).toUpperCase(); saveUser({uid,nickname:escapeHTML(name),avatar:'fa-user-astronaut',joinedAt:new Date().toISOString()}); } currentUser=loadUser(); cancelAnimationFrame(lcRafId); document.removeEventListener('mousemove',mmHandler); checkDailyReset(); showView('TEST'); const todayData=loadTodayData(); if(todayData&&todayData.completed) renderResultPage(todayData.type,todayData.sessionConfig); else { document.getElementById('result-card').style.display='none'; document.getElementById('test-card').style.display='block'; startStep(0); } } beginBtn.onclick=()=>doLogin(nickEl.value); nickEl.onkeydown=e=>{ if(e.key==='Enter') doLogin(nickEl.value); }; signupEl.onclick=e=>{ e.preventDefault(); doLogin(nickEl.value||'NewEcho'); }; }
function init(){ checkDailyReset(); initTestView(); currentUser=loadUser(); if(!currentUser){ showView('LOGIN'); initLoginView(); } else { const todayData=loadTodayData(); showView('TEST'); if(todayData&&todayData.completed){ Object.assign(sessionConfig,todayData.sessionConfig||{}); renderResultPage(todayData.type,todayData.sessionConfig); } else { document.getElementById('result-card').style.display='none'; document.getElementById('test-card').style.display='block'; startStep(0); } } }
document.addEventListener('DOMContentLoaded', init);
  </script>
